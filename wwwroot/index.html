<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека треков</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        h2 {
            color: #a0a0ff;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .card {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2a2a3e;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #b0b0d0;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #2a2a3e;
            border-radius: 8px;
            font-size: 14px;
            background: #0f0f1e;
            color: #e0e0e0;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #6060ff;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn-primary {
            background: #6060ff;
            color: white;
        }

        .btn-primary:hover {
            background: #4848dd;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(96, 96, 255, 0.4);
        }

        .btn-secondary {
            background: #404060;
            color: white;
        }

        .btn-secondary:hover {
            background: #505070;
        }

        #tracksList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .track-item {
            background: #252540;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #353550;
        }

        .track-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(96, 96, 255, 0.3);
            border-color: #6060ff;
        }

        .track-item h3 {
            color: #a0a0ff;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .track-item p {
            margin: 5px 0;
            color: #c0c0d0;
        }

        .track-item .artist {
            font-weight: 600;
            color: #8080ff;
        }

        .track-item .duration {
            font-size: 0.9em;
            color: #9090a0;
            margin-top: 10px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #1a3a1a;
            color: #80ff80;
            border: 1px solid #2a5a2a;
        }

        .message.error {
            background: #3a1a1a;
            color: #ff8080;
            border: 1px solid #5a2a2a;
        }

        .search-section {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .search-section .form-group {
            flex: 1;
        }

        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .filter-section input {
            flex: 1;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: #1a1a2e;
            margin: 15% auto;
            padding: 30px;
            border: 1px solid #6060ff;
            border-radius: 15px;
            width: 400px;
            max-width: 90%;
            animation: slideIn 0.3s;
            box-shadow: 0 10px 50px rgba(96, 96, 255, 0.3);
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            color: #a0a0ff;
            font-size: 1.5em;
        }

        .modal-close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }

        .modal-close:hover {
            color: #fff;
        }

        .modal-body {
            color: #e0e0e0;
            line-height: 1.6;
        }

        .modal.error .modal-content {
            border-color: #ff6060;
        }

        .modal.error .modal-title {
            color: #ff8080;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Библиотека треков</h1>

        <div id="message" class="message"></div>

        <div class="card">
            <h2>Добавить новый трек</h2>
            <form id="addTrackForm">
                <div class="form-group">
                    <label for="title">Название</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="artist">Исполнитель</label>
                    <input type="text" id="artist" required>
                </div>
                <div class="form-group">
                    <label for="album">Альбом</label>
                    <input type="text" id="album" required>
                </div>
                <div class="form-group">
                    <label for="duration">Длительность (секунды)</label>
                    <input type="number" id="duration" required min="1">
                </div>
                <button type="submit" class="btn btn-primary">Добавить трек</button>
            </form>
        </div>

        <div class="card">
            <h2>Найти трек по ID</h2>
            <div class="search-section">
                <div class="form-group">
                    <label for="searchId">ID трека</label>
                    <input type="number" id="searchId" min="1">
                </div>
                <button id="searchBtn" class="btn btn-secondary">Найти</button>
            </div>
        </div>

        <div class="card">
            <h2>Мои треки</h2>
            <div class="filter-section">
                <input type="text" id="artistFilter" placeholder="Фильтр по исполнителю">
                <button id="filterBtn" class="btn btn-secondary">Применить фильтр</button>
                <button id="clearFilterBtn" class="btn btn-secondary">Сбросить</button>
            </div>
            <button id="loadTracksBtn" class="btn btn-primary">Загрузить все треки</button>
            <div id="tracksList"></div>
        </div>
    </div>

    <div id="errorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">Ошибка</span>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body" id="errorModalBody"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080';

        const modal = document.getElementById('errorModal');
        const modalBody = document.getElementById('errorModalBody');
        const closeBtn = document.querySelector('.modal-close');

        closeBtn.onclick = function() {
            modal.style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        function showErrorModal(message, details = null) {
            modalBody.innerHTML = `
                <p><strong>Сообщение:</strong> ${message}</p>
                ${details ? `<p><strong>Детали:</strong> ${details}</p>` : ''}
            `;
            modal.classList.add('error');
            modal.style.display = 'block';
        }

        function showMessage(text, type = 'success') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 3000);
        }

        function formatDuration(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        function displayTracks(tracks) {
            const tracksList = document.getElementById('tracksList');
            if (!tracks || tracks.length === 0) {
                tracksList.innerHTML = '<p style="text-align: center; color: #9090a0;">Треки не найдены</p>';
                return;
            }

            tracksList.innerHTML = tracks.map(track => `
                <div class="track-item">
                    <h3>${track.title}</h3>
                    <p class="artist">${track.artist}</p>
                    <p>${track.album}</p>
                    <p class="duration">${formatDuration(track.duration)}</p>
                </div>
            `).join('');
        }

        async function loadTracks(artistFilter = null) {
            try {
                let url = `${API_URL}/api/tracks`;
                if (artistFilter) {
                    url += `?artist=${encodeURIComponent(artistFilter)}`;
                }
                
                const response = await fetch(url);
                if (!response.ok) {
                    const error = await response.json();
                    showErrorModal(error.message, `Код ошибки: ${error.errorCode}\nID запроса: ${error.requestId}`);
                    return;
                }
                const tracks = await response.json();
                displayTracks(tracks);
                showMessage(artistFilter ? `Найдено треков: ${tracks.length}` : 'Треки успешно загружены');
            } catch (error) {
                showErrorModal('Не удалось загрузить треки', error.message);
            }
        }

        document.getElementById('loadTracksBtn').addEventListener('click', () => loadTracks());

        document.getElementById('filterBtn').addEventListener('click', () => {
            const artistFilter = document.getElementById('artistFilter').value.trim();
            if (artistFilter) {
                loadTracks(artistFilter);
            } else {
                showMessage('Введите имя исполнителя для фильтрации', 'error');
            }
        });

        document.getElementById('clearFilterBtn').addEventListener('click', () => {
            document.getElementById('artistFilter').value = '';
            loadTracks();
        });

        document.getElementById('addTrackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const track = {
                title: document.getElementById('title').value,
                artist: document.getElementById('artist').value,
                album: document.getElementById('album').value,
                duration: parseInt(document.getElementById('duration').value)
            };

            try {
                const response = await fetch(`${API_URL}/api/tracks`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(track)
                });

                if (!response.ok) {
                    const error = await response.json();
                    showErrorModal(error.message, `Код ошибки: ${error.errorCode}\nID запроса: ${error.requestId}`);
                    return;
                }
                
                showMessage('Трек успешно добавлен!');
                e.target.reset();
                loadTracks();
            } catch (error) {
                showErrorModal('Не удалось добавить трек', error.message);
            }
        });

        document.getElementById('searchBtn').addEventListener('click', async () => {
            const id = document.getElementById('searchId').value;
            if (!id) {
                showMessage('Введите ID трека', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/tracks/${id}`);
                if (!response.ok) {
                    const error = await response.json();
                    showErrorModal(error.message, `Код ошибки: ${error.errorCode}\nID запроса: ${error.requestId}`);
                    return;
                }
                const track = await response.json();
                displayTracks([track]);
                showMessage('Трек найден!');
            } catch (error) {
                showErrorModal('Не удалось найти трек', error.message);
            }
        });

        window.addEventListener('load', () => {
            loadTracks();
        });
    </script>
</body>
</html>
